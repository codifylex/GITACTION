name: Deploy HostGator Laravel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ vars.REMOTE_HOST }}
          username: ${{ vars.REMOTE_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script_stop: true
          command_timeout: 30m
          script: |
            set -e

            PHP_BIN="/usr/local/bin/ea-php84"
            COMPOSER="$PHP_BIN /opt/cpanel/composer/bin/composer"

            echo "========================================"
            echo " INICIANDO DEPLOY"
            echo "========================================"

            echo ""
            echo "Usuário:"
            whoami

            echo ""
            echo "Versão do PHP:"
            $PHP_BIN -v

            echo ""
            echo "Versão do Composer:"
            $COMPOSER --version

            echo ""
            echo "Entrando na aplicação..."
            cd /home1/techsp95/public_html

            echo ""
            echo "Diretório:"
            pwd

            echo ""
            echo "Atualizando código..."
            git fetch origin
            git reset --hard origin/main

            echo ""
            echo "Instalando dependências..."
            $COMPOSER install \
              --no-dev \
              --prefer-dist \
              --optimize-autoloader \
              --no-interaction

            echo ""
            echo "Verificando .env..."
            test -f .env || { echo "❌ Arquivo .env não encontrado."; exit 1; }

            echo "✅ .env encontrado"

            echo ""
            echo "Laravel:"
            $PHP_BIN artisan --version

            echo ""
            echo "Executando migrations..."
            $PHP_BIN artisan migrate --force

            echo ""
            echo "Limpando caches..."
            $PHP_BIN artisan optimize:clear

            echo ""
            echo "Gerando caches..."
            $PHP_BIN artisan config:cache
            $PHP_BIN artisan route:cache
            $PHP_BIN artisan view:cache

            echo ""
            echo "Criando link do storage..."
            $PHP_BIN artisan storage:link || true

            echo ""
            echo "Ajustando permissões..."
            chmod -R 775 storage
            chmod -R 775 bootstrap/cache

            echo ""
            echo "Verificando APP_KEY..."

            APP_KEY=$(grep '^APP_KEY=' .env 2>/dev/null | cut -d= -f2- || true)

            if [ -z "$APP_KEY" ]; then
                echo "APP_KEY não encontrada. Gerando..."
                $PHP_BIN artisan key:generate --force
            else
                echo "APP_KEY já configurada."
            fi

            echo ""
            echo "Verificando Node.js..."
            node -v

            echo ""
            echo "Verificando NPM..."
            npm -v

            echo ""
            echo "Instalando dependências do Node..."
            npm install

            echo ""
            echo "Gerando assets do Vite..."
            npm run build

            echo ""
            echo "========================================"
            echo " DEPLOY FINALIZADO COM SUCESSO"
            echo "========================================"