name: Deploy HostGator Laravel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ vars.REMOTE_HOST }}
          username: ${{ vars.REMOTE_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script_stop: true
          command_timeout: 30m
          script: |
            set -e

            echo "========================================"
            echo " INICIANDO DEPLOY"
            echo "========================================"

            echo ""
            echo "Usuário:"
            whoami

            echo ""
            echo "Diretório atual:"
            pwd

            echo ""
            echo "Versão do PHP:"
            php -v

            echo ""
            echo "Configurando PATH..."
            export PATH="/opt/cpanel/composer/bin:$PATH"

            echo ""
            echo "PATH:"
            echo $PATH

            echo ""
            echo "Composer:"
            which composer
            composer --version

            echo ""
            echo "Entrando na aplicação..."
            cd /home1/techsp95/public_html

            echo ""
            echo "Diretório da aplicação:"
            pwd

            echo ""
            echo "Arquivos encontrados:"
            ls -la

            echo ""
            echo "Verificando estrutura do Laravel..."

            test -f artisan || { echo "❌ artisan não encontrado"; exit 1; }
            test -d bootstrap || { echo "❌ bootstrap não encontrada"; exit 1; }
            test -d storage || { echo "❌ storage não encontrada"; exit 1; }

            echo "✅ Estrutura OK"

            echo ""
            echo "Atualizando código..."
            git fetch origin
            git reset --hard origin/main

            echo ""
            echo "Instalando dependências..."
            composer install \
              --no-dev \
              --prefer-dist \
              --optimize-autoloader \
              --no-interaction

            echo ""
            echo "Verificando .env..."
            test -f .env || { echo "❌ .env não encontrado"; exit 1; }

            echo "✅ .env encontrado"

            echo ""
            echo "Limpando caches..."
            php artisan optimize:clear

            echo ""
            echo "Gerando caches..."
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            echo ""
            echo "Executando migrations..."
            php artisan migrate --force

            echo ""
            echo "Criando link do storage..."
            php artisan storage:link || true

            echo ""
            echo "Ajustando permissões..."
            chmod -R 775 storage
            chmod -R 775 bootstrap/cache

            echo ""
            echo "Verificando permissões..."
            ls -la storage
            ls -la bootstrap/cache

            echo ""
            echo "========================================"
            echo " DEPLOY FINALIZADO COM SUCESSO"
            echo "========================================"
            