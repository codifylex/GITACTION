name: Deploy HostGator Laravel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ vars.REMOTE_HOST }}
          username: ${{ vars.REMOTE_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script_stop: true
          command_timeout: 30m
          script: |
            set -e

            PHP_BIN="/usr/local/bin/ea-php84"
            COMPOSER="$PHP_BIN /opt/cpanel/composer/bin/composer"

            echo "========================================"
            echo " INICIANDO DEPLOY"
            echo "========================================"

            echo ""
            echo "Usuário:"
            whoami

            echo ""
            echo "Versão do PHP:"
            $PHP_BIN -v

            echo ""
            echo "Versão do Composer:"
            $COMPOSER --version

            echo ""
            echo "Entrando na aplicação..."
            cd /home1/techsp95/public_html

            echo ""
            echo "Diretório:"
            pwd

            echo ""
            echo "Atualizando código..."
            git fetch origin
            git reset --hard origin/main

            echo ""
            echo "Instalando dependências..."
            $COMPOSER install \
              --no-dev \
              --prefer-dist \
              --optimize-autoloader \
              --no-interaction

            echo ""
            echo "Verificando .env..."
            test -f .env || { echo "❌ Arquivo .env não encontrado."; exit 1; }

            echo "✅ .env encontrado"

            echo ""
            echo "Laravel:"
            $PHP_BIN artisan --version

            echo ""
            echo "Executando migrations..."
            $PHP_BIN artisan migrate --force

            echo " "
            echo "Verificando se o banco já foi inicializado..."

            HAS_USERS=$($PHP_BIN artisan tinker --execute="echo \App\Models\User::count();" 2>/dev/null || echo "0")

            if [ "$HAS_USERS" = "0" ]; then
                echo "Primeira instalação. Executando seeders..."
                $PHP_BIN artisan db:seed --force
            else
                echo "Banco já inicializado. Seeders ignorados."
            fi

            echo ""
            echo "Limpando caches..."
            $PHP_BIN artisan optimize:clear

            echo ""
            echo "Gerando caches..."
            $PHP_BIN artisan config:cache
            $PHP_BIN artisan route:cache
            $PHP_BIN artisan view:cache

            echo ""
            echo "Criando link do storage..."
            $PHP_BIN artisan storage:link || true

            echo ""
            echo "Ajustando permissões..."
            chmod -R 775 storage
            chmod -R 775 bootstrap/cache

            echo ""
            echo "========================================"
            echo " DEPLOY FINALIZADO COM SUCESSO"
            echo "========================================"